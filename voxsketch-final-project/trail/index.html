<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | VoxSketch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; opacity: 0; transition: opacity 0.5s ease-in-out; }
        body.loaded { opacity: 1; }
        .text-gradient { background: linear-gradient(90deg, #22c55e 0%, #4ade80 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-link { position: relative; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background-color: #22c55e; transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <header class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md z-50 shadow-sm">
        <nav class="container mx-auto flex justify-between items-center px-6 py-4">
            <a href="index.html" class="flex items-center gap-3">
                <img 
                    src="images/logo.png" 
                    alt="VoxSketch Logo" 
                    class="w-14 h-14 md:w-16 md:h-16 object-contain"
                />
                <span class="text-2xl font-bold text-[#111827]">VoxSketch</span>
            </a>

            <div class="hidden md:flex items-center space-x-8 font-medium">
                <a href="index.html" class="text-[#111827] nav-link">Home</a>
                <a href="services.html" class="text-gray-600 hover:text-[#111827] nav-link">Services</a>
                <a href="about.html" class="text-gray-600 hover:text-[#111827] nav-link">About & Demo</a>
                <a href="contact.html" class="text-gray-600 hover:text-[#111827] nav-link">Contact</a>
            </div>
            <a href="services.html" class="hidden md:inline-block bg-[#111827] hover:bg-[#22c55e] text-white px-6 py-2 rounded-full font-semibold transition duration-300 shadow-lg hover:shadow-green-300/50">Get Started</a>
        </nav>
    </header>

    <section class="relative h-screen flex items-center justify-center text-center pt-20">
        <div class="absolute inset-0 z-0">
            <img src="images/background.jpg" alt="Background" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-white/80"></div>
        </div>

        <div class="relative z-10 container mx-auto px-6">
            <h1 class="text-5xl md:text-7xl font-bold mb-6 text-[#111827] reveal">
                VoxSketch
                <span class="block mt-2">"where voice meets <span class="text-gradient">vision</span>"</span>
            </h1>
            <p class="text-xl text-gray-600 mb-10 max-w-2xl mx-auto reveal">
                Turn your voice into a canvas of imagination. Every word brings a sketch to life using advanced AI forensics.
            </p>
            <div class="flex justify-center gap-4 reveal">
                <a href="services.html" class="bg-[#111827] text-white px-8 py-3 rounded-full font-semibold transition hover:bg-[#22c55e] hover:shadow-lg hover:-translate-y-1">Start Sketching</a>
                <a href="about.html" class="bg-white text-[#111827] border-2 border-[#111827] px-8 py-3 rounded-full font-semibold transition hover:bg-gray-50">Learn More</a>
            </div>
        </div>
    </section>

    <script>
        // Page Load Animation
        window.addEventListener('load', () => document.body.classList.add('loaded'));
        // Scroll Reveal
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
