<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | VoxSketch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; opacity: 0; transition: opacity 0.5s ease-in-out; }
        body.loaded { opacity: 1; }
        .nav-link:hover::after { width: 100%; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background-color: #22c55e; transition: width 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <header class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md z-50 shadow-sm">
        <nav class="container mx-auto flex justify-between items-center px-6 py-4">
            <a href="index.html" class="flex items-center gap-2"><span class="text-2xl font-bold text-[#111827]">VoxSketch</span></a>
            <div class="hidden md:flex items-center space-x-8 font-medium">
                <a href="index.html" class="text-gray-600 hover:text-[#111827] nav-link">Home</a>
                <a href="services.html" class="text-gray-600 hover:text-[#111827] nav-link">Services</a>
                <a href="about.html" class="text-gray-600 hover:text-[#111827] nav-link">About & Demo</a>
                <a href="contact.html" class="text-[#111827] nav-link">Contact</a>
            </div>
            <a href="services.html" class="hidden md:inline-block bg-[#111827] text-white px-6 py-2 rounded-full font-semibold transition">Get Started</a>
        </nav>
    </header>

    <section class="flex-grow flex items-center justify-center pt-24 px-6">
        <div class="max-w-4xl w-full grid md:grid-cols-2 gap-0 bg-white rounded-3xl shadow-2xl overflow-hidden">
            
            <div class="bg-[#111827] text-white p-12 flex flex-col justify-center">
                <h2 class="text-3xl font-bold mb-6">Get in Touch</h2>
                <p class="text-gray-400 mb-8">Ready to revolutionize your investigation process? Send us a message.</p>
                <div class="space-y-4">
                    <p class="flex items-center gap-3"><span>📍</span> 123 Forensic Lane, Tech City</p>
                    <p class="flex items-center gap-3"><span>📧</span> contact@voxsketch.ai</p>
                    <p class="flex items-center gap-3"><span>📞</span> +1 (555) 123-4567</p>
                </div>
            </div>

            <div class="p-12">
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#22c55e] focus:ring-1 focus:ring-[#22c55e] transition" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#22c55e] focus:ring-1 focus:ring-[#22c55e] transition" placeholder="john@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                        <textarea rows="4" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#22c55e] focus:ring-1 focus:ring-[#22c55e] transition" placeholder="How can we help?"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-[#111827] hover:bg-gray-800 text-white py-3 rounded-lg font-semibold transition transform hover:scale-[1.02]">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-white py-6 text-center text-gray-500 text-sm">
        &copy; 2025 VoxSketch. All rights reserved.
    </footer>

    <script>window.addEventListener('load', () => document.body.classList.add('loaded'));</script>
</body>
</html>
