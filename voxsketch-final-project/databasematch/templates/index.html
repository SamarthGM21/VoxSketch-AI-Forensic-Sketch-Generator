<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forensic Sketch Matcher | VoxSketch</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #111827; 
            --accent-green: #4ade80; 
            --text-main: #333;
            --bg-color: #ffffff;
            --bg-secondary: #f9fafb;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(var(--bg-secondary) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
            opacity: 0.5;
        }

        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            width: 90%;
            max-width: 600px; 
            animation: fadeUp 0.8s ease-out;
            border: 1px solid rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-navy);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .upload-box {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 4rem 2rem; 
            min-height: 250px; 
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .upload-box:hover {
            border-color: var(--primary-navy);
            background: #fff;
            transform: scale(1.01);
        }

        input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 60px; 
            margin-bottom: 15px;
            display: block;
            color: var(--primary-navy);
        }

        .upload-text {
            font-size: 1.1rem;
            color: #555;
        }

        /* NEW: gender selection block */
        .gender-group {
            margin-top: 1.5rem;
            text-align: left;
            font-size: 0.9rem;
        }

        .gender-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
            color: #374151;
        }

        .gender-options label {
            margin-right: 1.5rem;
            font-size: 0.9rem;
            cursor: pointer;
        }

        button {
            background-color: var(--primary-navy);
            color: white;
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            margin-top: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 24, 39, 0.3);
        }

        .error {
            color: #ef4444;
            background: #fef2f2;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Forensic Matcher</h1>
        <p class="subtitle">Upload a sketch to analyze against the database.</p>
        
        <form action="/search" method="post" enctype="multipart/form-data">
            <div class="upload-box">
                <span class="upload-icon">📁</span>
                <span class="upload-text">Click to browse or drop file here</span>
                <input type="file" name="file" accept="image/*" required 
                       onchange="this.previousElementSibling.innerText = this.files[0].name">
            </div>

            <!-- NEW: Suspect gender selection -->
            <div class="gender-group">
                <span class="gender-label">Suspect Gender</span>
                <div class="gender-options">
                    <label>
                        <input type="radio" name="gender" value="M" checked>
                        Male
                    </label>
                    <label>
                        <input type="radio" name="gender" value="F">
                        Female
                    </label>
                    <label>
                        <input type="radio" name="gender" value="U">
                        Unknown
                    </label>
                </div>
            </div>
            
            <button type="submit">Analyze Sketch</button>
        </form>

        {% if error %}
            <div class="error">⚠️ {{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
